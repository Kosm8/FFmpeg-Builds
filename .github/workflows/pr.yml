name: Test Full Build
on:
  workflow_dispatch:
    branches:
      - master

jobs:
  build:
    name: Build ffmpeg
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        target: [win32]
        variant: [gpl,gpl-shared,gpl 4.3]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build Image
        run: ./makeimage.sh ${{ matrix.target }} ${{ matrix.variant }}
      - name: Build ffmpeg
        run: ./build.sh ${{ matrix.target }} ${{ matrix.variant }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: ffmpeg
          path: artifacts/*
